<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ming Li · Payment Confirmed</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07080F;color:#E8E0CC;font-family:'EB Garamond',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.box{max-width:480px;width:100%}
.glyph{font-size:52px;margin-bottom:28px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.7}50%{opacity:1}}
h1{font-family:'Cinzel',serif;font-size:22px;letter-spacing:0.15em;color:#C9A84C;margin-bottom:16px}
.msg{font-size:17px;line-height:1.85;color:#A89880;margin-bottom:12px}
.sub{font-size:13px;color:#7A7060;margin-bottom:36px;line-height:1.6}
.btn{display:inline-block;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;color:#07080F;background:#C9A84C;border:none;padding:14px 32px;border-radius:8px;text-decoration:none;cursor:pointer;transition:opacity 0.2s}
.btn:hover{opacity:0.85}
.divider{width:40px;height:0.5px;background:#7A6030;margin:0 auto 28px;opacity:0.5}
</style>
</head>
<body>
<div class="box">
  <div class="glyph">✦</div>
  <h1 id="title">Payment Confirmed</h1>
  <div class="divider"></div>
  <p class="msg" id="msg">Your full destiny reading is now unlocked.</p>
  <p class="sub" id="sub">Return to Ming Li to discover everything your birth chart has been waiting to reveal. A receipt has been sent to your email.</p>
  <a href="/" class="btn" id="btn">Return to Ming Li →</a>
</div>
<script>
  const lang = (navigator.language || 'en').startsWith('fr') ? 'fr' : 'en';
  if (lang === 'fr') {
    document.getElementById('title').textContent = 'Paiement Confirmé';
    document.getElementById('msg').textContent   = 'Votre rapport complet est maintenant débloqué.';
    document.getElementById('sub').textContent   = 'Retournez sur Ming Li pour découvrir tout ce que votre thème natal révèle. Un reçu a été envoyé à votre adresse e-mail.';
    document.getElementById('btn').textContent   = 'Retour à Ming Li →';
    document.documentElement.lang = 'fr';
  }
</script>
</body>
</html>
