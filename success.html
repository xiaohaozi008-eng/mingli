<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ming Li · Payment Confirmed</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07080F;color:#E8E0CC;font-family:'EB Garamond',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.box{max-width:440px;width:100%}
.ring{width:56px;height:56px;margin:0 auto 24px;border:1px solid rgba(201,168,76,0.3);border-top-color:#C9A84C;border-radius:50%;animation:spin 1.2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-family:'Cinzel',serif;font-size:20px;letter-spacing:0.15em;color:#C9A84C;margin-bottom:12px}
p{font-size:15px;line-height:1.8;color:#A89880;margin-bottom:8px}
.sub{font-size:12px;color:#7A7060;margin-top:16px}
</style>
</head>
<body>
<div class="box">
  <div class="ring"></div>
  <h1 id="title">Payment Confirmed</h1>
  <p id="msg">Preparing your complete destiny reading…</p>
  <p class="sub" id="sub">You will be redirected in a moment.</p>
</div>
<script>
  const lang = localStorage.getItem('mingli_lang') || 'en';
  const plan = localStorage.getItem('mingli_plan') || 'single';

  if (lang === 'fr') {
    document.getElementById('title').textContent = 'Paiement Confirmé';
    document.getElementById('msg').textContent   = 'Préparation de votre lecture complète…';
    document.getElementById('sub').textContent   = 'Vous allez être redirigé dans un instant.';
    document.documentElement.lang = 'fr';
  }

  // Redirect to report page after 1.5s
  setTimeout(() => {
    window.location.href = '/report.html';
  }, 1500);
</script>
</body>
</html>
